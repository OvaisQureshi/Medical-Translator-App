<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Translator App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="portal-card">
            <div class="portal-header">
                <div>
                    <p class="eyebrow">Patient Portal</p>
                    <h1>Medical Translator App</h1>
                    <p class="subtitle">
                        Log in to view your prescription information.
                    </p>
                </div>
            </div>

            {% if login_error %}
                <div class="login-error">{{ login_error }}</div>
            {% endif %}

            <form method="POST" class="patient-form">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Enter your first name" required>

                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="Enter your last name" required>

                <button type="submit" class="primary-button">Log In</button>
            </form>
        </div>
    </div>
</body>
</html>
